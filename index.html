<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chip Pilot 2.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#EBEBE9;--bg2:#E4E4E1;--bg3:#F2F2F0;--bg4:#F8F8F6;--bg5:#DCDBD7;
  --border:rgba(152,148,144,.28);--sep:rgba(152,148,144,.20);
  --text:#1C1A18;--text2:#3A3733;--muted:#989490;
  --green:#3a7200;--amber:#8a5e00;--red:#b82020;--blue:#1a54a0;--cyan:#007080;
  --nav-w:200px;--hdr-h:48px;--tab-h:38px;
  --card-r:8px;--shadow:0 1px 4px rgba(60,54,48,.10);
  --green-bg:rgba(58,114,0,.10);--amber-bg:rgba(138,94,0,.10);
  --red-bg:rgba(184,32,32,.10);--blue-bg:rgba(26,84,160,.10);
}
body.dark{
  --bg:#050810;--bg2:#040710;--bg3:#080c18;--bg4:#1a2232;--bg5:#1e2a3a;
  --border:rgba(255,255,255,.12);--sep:rgba(46,61,86,.8);
  --text:#d8eaf8;--text2:#b8cede;--muted:#6888a0;
  --green:#7ec200;--amber:#d09800;--red:#cc4444;--blue:#4e9ae0;--cyan:#14b8cc;
  --shadow:0 2px 12px rgba(0,0,0,.40);
  --green-bg:rgba(126,194,0,.10);--amber-bg:rgba(208,152,0,.12);
  --red-bg:rgba(204,68,68,.14);--blue-bg:rgba(78,154,224,.12);
}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;background:var(--bg);color:var(--text)}
/* -- LAYOUT -- */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#hdr{height:var(--hdr-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:10}
#body{display:flex;flex:1;overflow:hidden}
#nav{width:var(--nav-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;font-size:12px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
#tabs{height:var(--tab-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:0;flex-shrink:0;overflow-x:auto}
#views{flex:1;overflow-y:auto;padding:14px}
/* -- HEADER -- */
.logo{font-size:14px;font-weight:800;letter-spacing:.5px;color:var(--text);display:flex;align-items:center;gap:7px}
.logo-v{font-size:10px;font-weight:700;color:var(--green);background:var(--green-bg);padding:1px 6px;border-radius:10px;letter-spacing:.5px}
.hdr-spacer{flex:1}
.badge{padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;border:1px solid;transition:opacity .15s}
.badge:hover{opacity:.8}
.badge-r{background:var(--red-bg);color:var(--red);border-color:rgba(184,32,32,.28)}
.badge-b{background:var(--blue-bg);color:var(--blue);border-color:rgba(26,84,160,.20)}
.theme-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:3px 9px;border-radius:6px;cursor:pointer;font-size:11px;transition:all .15s}
.theme-btn:hover{color:var(--text);border-color:var(--muted)}
/* -- NAV -- */
.nav-hdr{font-size:9px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);padding:10px 12px 6px}
.nav-grp{border-top:1px solid var(--sep)}
.nav-grp-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--text2);background:rgba(0,0,0,.02);border-left:3px solid transparent;transition:all .15s;user-select:none}
.nav-grp:not(.closed) .nav-grp-hdr{border-left-color:var(--green);background:var(--green-bg)}
.nav-grp-hdr:hover{background:var(--green-bg)}
.nav-grp-arrow{transition:transform .2s;font-size:10px;color:var(--muted)}
.nav-grp.closed .nav-grp-arrow{transform:rotate(-90deg)}
.nav-chips{overflow:hidden;max-height:600px;transition:max-height .25s ease}
.nav-grp.closed .nav-chips{max-height:0}
.nav-chip{padding:7px 12px 6px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .12s}
.nav-chip:hover{background:rgba(0,0,0,.03);border-left-color:var(--muted)}
.nav-chip.active{background:var(--green-bg);border-left-color:var(--green)}
.nc-code{font-size:11px;font-weight:700;color:var(--text)}
.nc-name{font-size:10px;color:var(--muted);margin-top:1px}
.nc-bar{height:3px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden}
.nc-fill{height:100%;border-radius:2px;transition:width .3s}
.nav-static{border-top:1px solid var(--sep)}
.nav-static-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px 7px;font-size:9px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--text2);border-left:3px solid var(--blue)}
.nav-feed{padding:6px 12px;display:flex;flex-direction:column;gap:5px}
.nf-item{display:flex;flex-direction:column;gap:1px}
.nf-t{font-size:10px;font-weight:600;color:var(--text2)}
.nf-s{font-size:9px;color:var(--muted)}
.nf-r .nf-t{color:var(--red)}
.nf-g .nf-t{color:var(--green)}
/* -- TABS -- */
.tab{padding:0 14px;height:var(--tab-h);display:flex;align-items:center;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;gap:5px;transition:all .12s;user-select:none}
.tab:hover{color:var(--text2)}
.tab.on{color:var(--text);border-bottom-color:var(--green)}
.tab-close{font-size:13px;color:var(--muted);margin-left:4px;line-height:1;border-radius:3px;padding:0 2px;transition:all .12s}
.tab-close:hover{color:var(--red);background:var(--red-bg)}
/* -- VIEWS -- */
.view{display:flex;flex-direction:column;gap:14px}
.view[hidden]{display:none!important}
/* -- SECTION LABEL -- */
.sec-label{display:flex;align-items:center;gap:7px;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:4px 0 8px;border-bottom:1px solid var(--border);margin-bottom:10px}
/* -- CHIP GRID -- */
.chips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.cc{background:var(--bg4);border:1px solid var(--border);border-radius:var(--card-r);padding:11px 12px;cursor:pointer;transition:all .15s;border-left:3px solid var(--border)}
.cc:hover{transform:translateY(-1px);box-shadow:var(--shadow);border-color:var(--muted)}
.cc.g{border-left-color:var(--green)}.cc.a{border-left-color:var(--amber)}.cc.r{border-left-color:var(--red)}.cc.b{border-left-color:var(--blue)}
.cc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.cc-name{font-size:12px;font-weight:700;color:var(--text)}
.cc-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px}
.bg-g{background:var(--green-bg);color:var(--green)}.bg-a{background:var(--amber-bg);color:var(--amber)}.bg-r{background:var(--red-bg);color:var(--red)}.bg-b{background:var(--blue-bg);color:var(--blue)}.bg-w{background:rgba(100,100,100,.10);color:var(--muted)}
.cc-phase{font-size:10px;color:var(--muted);margin-bottom:6px}
.cc-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:6px;overflow:hidden}
.cc-fill{height:100%;border-radius:2px}
.cc-row{display:flex;justify-content:space-between;font-size:10px;color:var(--text2)}
.cc-cm{font-size:10px;color:var(--muted);margin-top:4px}
.cc-cm span{color:var(--text2);font-weight:600}
/* -- CARDS -- */
.card{background:var(--bg4);border:1px solid var(--border);border-radius:var(--card-r);overflow:hidden}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.02)}
.card-title{font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--text)}
.card-body{padding:12px}
/* -- TABLE -- */
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{padding:5px 8px;text-align:left;font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
.tbl td{padding:6px 8px;border-bottom:1px solid var(--sep);color:var(--text2)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(0,0,0,.02)}
/* -- HEATMAP -- */
.hm-wrap{overflow-x:auto}
.hm-tbl{border-collapse:separate;border-spacing:2px;font-size:10px;white-space:nowrap}
.hm-tbl th{font-size:8px;font-weight:700;text-align:center;color:var(--muted);padding:2px 3px}
.hm-tbl th:first-child{text-align:left;min-width:90px;color:var(--text2)}
.hm-cell{width:32px;height:22px;border-radius:3px;text-align:center;font-size:9px;font-weight:700;vertical-align:middle}
.hm-l{background:rgba(58,114,0,.18);color:var(--green)}.hm-m{background:rgba(138,94,0,.22);color:var(--amber)}.hm-h{background:rgba(184,32,32,.22);color:var(--red)}
.hm-legend{display:flex;gap:12px;margin-top:8px;font-size:10px;color:var(--muted);align-items:center}
.hm-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
/* -- PM ASSISTANT -- */
.pm-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.pm-col-hdr{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--text2);padding:0 0 8px;border-bottom:1px solid var(--border);margin-bottom:10px}
.pm-item{background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:9px 10px;margin-bottom:8px;border-left:3px solid var(--border);transition:all .12s}
.pm-item.urgent{border-left-color:var(--red)}
.pm-item.week{border-left-color:var(--amber)}
.pm-item.fyi{border-left-color:var(--blue)}
.pm-item-title{font-size:11px;font-weight:600;color:var(--text);margin-bottom:3px}
.pm-item-sub{font-size:10px;color:var(--muted)}
.pm-item-chip{font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;display:inline-block;margin-top:4px}
/* -- PM CHIP SELECTOR -- */
.pm-sel-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:10px 12px;background:var(--bg4);border:1px solid var(--border);border-radius:var(--card-r);margin-bottom:14px}
.pm-sel-lbl{font-size:9px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);flex-shrink:0;margin-right:4px}
.pm-pill{padding:4px 11px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .12s;white-space:nowrap}
.pm-pill:hover{border-color:var(--green);color:var(--green)}
.pm-pill.on{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.pm-chip-header{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg4);border:1px solid var(--border);border-radius:var(--card-r);margin-bottom:14px}
.pm-chip-name{font-size:16px;font-weight:800;color:var(--text)}
.pm-chip-meta{font-size:11px;color:var(--muted)}
/* -- STATUS DRAFT -- */
.draft-output{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px;font-size:11px;line-height:1.6;color:var(--text2);white-space:pre-wrap;font-family:'Courier New',monospace;max-height:360px;overflow-y:auto}
.btn{padding:5px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s}
.btn-green{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.btn-green:hover{background:var(--green);color:#fff}
/* -- CHIP DETAIL -- */
.cv-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ms-list{display:flex;flex-direction:column;gap:6px}
.ms-item{display:flex;align-items:center;gap:8px;font-size:11px}
.ms-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ms-dot.done{background:var(--green)}.ms-dot.now{background:var(--blue)}.ms-dot.wait{background:var(--border)}
.ms-name{font-weight:600;color:var(--text2)}
.ms-date{color:var(--muted);font-size:10px;margin-left:auto}
.risk-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--sep);font-size:11px;color:var(--text2)}
.risk-item:last-child{border-bottom:none}
.ri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.ri-h{background:var(--red)}.ri-m{background:var(--amber)}.ri-l{background:var(--green)}
/* -- GATE CHECKLIST -- */
.cl-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--sep);font-size:11px;cursor:pointer}
.cl-item:last-child{border-bottom:none}
.cl-item input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--green)}
.cl-label{color:var(--text2);flex:1}.cl-label.done{text-decoration:line-through;color:var(--muted)}
.cl-owner{font-size:10px;color:var(--muted)}
.cl-progress{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px}
.cl-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
/* -- COMMAND CENTER -- */
.cc-cats{display:flex;gap:2px;margin-bottom:12px;background:var(--bg4);border:1px solid var(--border);border-radius:var(--card-r);padding:3px;overflow-x:auto;flex-shrink:0}
.cc-cat{padding:6px 16px;border-radius:6px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .12s;white-space:nowrap;user-select:none}
.cc-cat:hover{color:var(--text)}
.cc-cat.on{background:var(--bg);color:var(--text);box-shadow:var(--shadow)}
.cc-layout{display:flex;gap:14px;align-items:flex-start}
.cc-main{flex:1;min-width:0}
.cc-panel{width:240px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
@media(max-width:1100px){.cc-panel{display:none}}
.cc-chip-block{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--sep)}
.cc-chip-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.cc-chip-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cc-chip-code{font-size:12px;font-weight:700;color:var(--text)}
.cc-chip-gate{font-size:10px;color:var(--muted);flex:1}
.cc-pct{font-size:11px;font-weight:700}
.cc-item{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:1px solid var(--sep);cursor:pointer;transition:background .1s}
.cc-item:hover{background:rgba(0,0,0,.02)}
.cc-item:last-child{border-bottom:none}
.cc-item input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--green);flex-shrink:0;margin-top:1px}
.cc-item-body{flex:1;min-width:0}
.cc-item-text{font-size:11px;color:var(--text2);line-height:1.4}
.cc-item-text.done{text-decoration:line-through;color:var(--muted)}
.cc-item-meta{display:flex;align-items:center;gap:6px;margin-top:3px}
.cc-item-owner{font-size:10px;color:var(--muted)}
.cc-pri{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;color:#fff;letter-spacing:.4px}
.cc-pri-h{background:var(--red)}.cc-pri-m{background:var(--amber)}.cc-pri-l{background:var(--muted)}
.cc-empty{font-size:11px;color:var(--muted);padding:14px 0;text-align:center}
.cc-score-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--sep);font-size:11px}
.cc-score-row:last-child{border-bottom:none}
/* -- RESPONSIVE GRIDS (used in JS render fns) -- */
.radar-grid{display:flex;flex-direction:column;gap:12px;max-width:860px;margin:0 auto;width:100%}
.pm-main-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
/* -- NEEDS ATTENTION BAR -- */
.attn-bar{display:flex;align-items:center;gap:12px;background:var(--bg4);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:var(--card-r);padding:8px 12px;margin-bottom:14px;overflow-x:auto;flex-shrink:0}
.attn-label{font-size:9px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--red);white-space:nowrap;flex-shrink:0}
.attn-items{display:flex;gap:7px;flex-wrap:wrap}
.attn-item{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;transition:all .12s}
.attn-item:hover{border-color:var(--amber);background:var(--amber-bg)}
.attn-item.urgent{border-left:2px solid var(--red)}
.attn-item.warn{border-left:2px solid var(--amber)}
.attn-chip{font-size:11px;font-weight:700;color:var(--text)}
.attn-status{font-size:10px;color:var(--muted)}
.attn-bug{font-size:10px;color:var(--red);font-weight:700}
/* -- NEW CHIP SETUP FORM -- */
.nc-form{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.nc-field{display:flex;flex-direction:column;gap:4px}
.nc-field.full{grid-column:1/-1}
.nc-label{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
.nc-input{padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px;width:100%;transition:border-color .15s}
.nc-input:focus{outline:none;border-color:var(--green)}
.nc-select{padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px;width:100%}
/* Page tree preview */
.pg-tree{display:flex;flex-direction:column;gap:1px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:12px;margin-bottom:14px}
.pg-node{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);padding:4px 2px;border-radius:4px;transition:background .1s}
.pg-node:hover{background:rgba(0,0,0,.03)}
.pg-node.root{font-weight:800;color:var(--text);font-size:13px;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.pg-l1{padding-left:20px}.pg-l2{padding-left:40px}
.pg-icon{font-size:11px;flex-shrink:0}
.pg-status{font-size:9px;font-weight:700;padding:1px 7px;border-radius:10px;margin-left:auto;white-space:nowrap}
.pg-pending{background:var(--amber-bg);color:var(--amber)}
.pg-done{background:var(--green-bg);color:var(--green)}
.pg-err{background:var(--red-bg);color:var(--red)}
.nc-result{background:var(--green-bg);border:1px solid var(--green);border-radius:7px;padding:12px 14px;font-size:11px;color:var(--green);line-height:1.7}
.nc-result a{color:var(--green);font-weight:600}
/* -- COCKPIT 2-PANE LAYOUT -- */
.ck-layout{display:flex;gap:14px;align-items:flex-start}
.ck-chips{flex:1;min-width:0;display:flex;flex-direction:column;gap:14px}
.ck-panel{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
@media(max-width:1300px){.ck-panel{display:none}}
@media(max-width:700px){.attn-items{flex-wrap:nowrap;overflow-x:auto}}
/* -- LARGE SCREEN: wider nav, cap card width -- */
@media(min-width:1400px){
  :root{--nav-w:220px}
  .chips-grid{grid-template-columns:repeat(auto-fill,minmax(220px,280px))}
}
/* -- HAMBURGER & NAV DRAWER -- */
#nav-toggle{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text);padding:2px 8px;line-height:1;border-radius:5px;transition:background .15s}
#nav-toggle:hover{background:var(--bg5)}
#nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:19;backdrop-filter:blur(1px)}
#nav-overlay.open{display:block}
/* -- BREAKPOINTS -- */
@media(max-width:900px){
  #nav{display:none;position:fixed;top:var(--hdr-h);left:0;bottom:0;width:220px;z-index:20;
       box-shadow:4px 0 20px rgba(0,0,0,.22);overflow-y:auto}
  #nav.open{display:flex;flex-direction:column}
  #nav-toggle{display:block}
  .pm-grid{grid-template-columns:1fr}
  .cv-grid{grid-template-columns:1fr}
  .pm-main-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .chips-grid{grid-template-columns:1fr 1fr}
  #views{padding:10px}
  .card-body{padding:10px}
  #hdr{padding:0 10px}
  .logo{font-size:13px}
  .badge-b{display:none}
  .draft-output{max-height:260px}
}
@media(max-width:420px){

/* ===============================================
   VIEW ROUTING
=============================================== */
function showView(v, chipId=null){
  S.view = v;
  S.chip = chipId;
  // Hide all
  ['cockpit','radar','pm','cc','chip'].forEach(id=>{
    document.getElementById('v-'+id).hidden = (id!==v);
  });
  // Render target
  if(v==='cockpit') renderCockpit();
  else if(v==='radar') renderRadar();
  else if(v==='pm') renderPM();
  else if(v==='cc') renderCC();
  else if(v==='chip' && chipId) renderChipDetail(chipId);
  renderTabBar();
  // Update nav active state
  document.querySelectorAll('.nav-chip').forEach(el=>{
    el.classList.toggle('active', el.dataset.cid===chipId && v==='chip');
  });
  // Auto-close nav drawer on mobile after navigation
  closeNavDrawer();
}

function openChip(id){
  if(!S.tabs.find(t=>t.id===id)) S.tabs.push({id});
  S.pmChip = id;   // pre-select in PM Assistant
  showView('chip', id);
}
function openPMForChip(id){
  S.pmChip = id;
  showView('pm');
}
function closeTab(id, e){
  e && e.stopPropagation();
  S.tabs = S.tabs.filter(t=>t.id!==id);
  if(S.chip===id){
    const next = S.tabs[S.tabs.length-1];
    next ? showView('chip', next.id) : showView('cockpit');
  } else renderTabBar();
}

function renderPM(){

    <div class="pm-pill${sel===c.id?' on':''}" onclick="selectPMChip('${c.id}')">${c.code}</div>`).join('');

    <span class="pm-sel-lbl">Focus:</span>
    ${allPill}${chipPills}
  </div>`;

  // -- Focused chip header (when one chip selected) --
  let chipHeader = '';
  if(sel){
    const c = CHIPS[sel];
    const barColor = c.color==='g'?'var(--green)':c.color==='a'?'var(--amber)':c.color==='r'?'var(--red)':'var(--blue)';
    chipHeader = `<div class="pm-chip-header">
      <span class="cc-badge bg-${c.color}" style="font-size:12px">${c.status}</span>
      <div>
        <div class="pm-chip-name">${c.code} / ${c.name}</div>
        <div class="pm-chip-meta">${c.phase} · SW CM: <b style="color:var(--text)">${c.cm}</b> · Next gate: <b style="color:${barColor}">${c.nextGate} · ${c.nextGateDate}</b></div>
      </div>
    </div>`;
  }

  // -- Action queue (filtered) --
  const urgent = [], thisWeek = [], fyi = [];
  chipList.forEach(c=>{
    if(c.bugs>0) urgent.push({t:`${c.bugs} P1 bug${c.bugs>1?'s':''} need action`,chip:c.code,id:c.id,cat:'urgent'});
    c.checklist.filter(i=>!i.done).slice(0,2).forEach(i=>{
      if(c.atRisk) urgent.push({t:i.t,chip:c.code,owner:i.owner,id:c.id,cat:'urgent'});
      else if(c.progress>30) thisWeek.push({t:i.t,chip:c.code,owner:i.owner,id:c.id,cat:'week'});
      else fyi.push({t:i.t,chip:c.code,owner:i.owner,id:c.id,cat:'fyi'});
    });
  });

  function pmCards(items, cls){
    if(!items.length) return `<div style="color:var(--muted);font-size:11px;padding:8px 0">✓ All clear</div>`;
    return items.map(i=>`
      <div class="pm-item ${cls}" onclick="openChip('${i.id}')">
        <div class="pm-item-title">${i.t}</div>
        ${i.owner?`<div class="pm-item-sub">Owner: ${i.owner}</div>`:''}
        ${!sel?`<span class="pm-item-chip bg-${cls==='urgent'?'r':cls==='week'?'a':'b'}">${i.chip}</span>`:''}
      </div>`).join('');
  }

  // -- Gate checklist --
  const chipOpts = Object.values(CHIPS).map(c=>
    `<option value="${c.id}"${sel===c.id?' selected':''}>${c.code} / ${c.name}</option>`).join('');

  // -- Draft placeholder --
  const draftPlaceholder = sel
    ? `Click "Generate" to draft today's status for ${CHIPS[sel].code} / ${CHIPS[sel].name}.`
    : `Click "Generate" to auto-draft your daily status update across all active chip programs.`;

  document.getElementById('v-pm').innerHTML = selBar + chipHeader + `
    <div class="pm-main-grid">
      <!-- Action Queue -->
      <div class="card" style="grid-column:1/-1">
        <div class="card-hdr"><span class="card-title">🎯 Today's Action Queue</span>
          <span style="font-size:10px;color:var(--muted)">${urgent.length} urgent · ${thisWeek.length} this week · ${fyi.length} FYI</span></div>
        <div class="card-body">
          <div class="pm-grid">
            <div><div class="pm-col-hdr" style="color:var(--red)">🚨 Urgent — Today</div>${pmCards(urgent,'urgent')}</div>
            <div><div class="pm-col-hdr" style="color:var(--amber)">📋 This Week</div>${pmCards(thisWeek,'week')}</div>
            <div><div class="pm-col-hdr" style="color:var(--blue)">📌 FYI / Next</div>${pmCards(fyi,'fyi')}</div>
          </div>
        </div>
      </div>
      <!-- Gate Checklist -->
      <div class="card">
        <div class="card-hdr"><span class="card-title">✅ Gate Checklist</span>
          <select id="cl-sel" onchange="renderChecklist()" style="font-size:11px;padding:3px 6px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);color:var(--text)">
            ${chipOpts}
          </select>
        </div>
        <div class="card-body" id="cl-body"></div>
      </div>
      <!-- Daily Status Draft -->
      <div class="card">
        <div class="card-hdr"><span class="card-title">📝 Daily Status Update</span>
          <button class="btn btn-green" onclick="genStatusDraft()">⚡ Generate</button>
        </div>
        <div class="card-body">
          <div class="draft-output" id="draft-out">${draftPlaceholder}</div>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn btn-green" onclick="copyDraft()">📋 Copy</button>
          </div>
        </div>
      </div>
    </div>`;
  renderChecklist();
}

function renderChecklist(){
  const sel = document.getElementById('cl-sel');
  if(!sel) return;
  const chip = CHIPS[sel.value];
  if(!chip) return;
  const key = chip.id;
  const done = S.clState[key] || {};
  const total = chip.checklist.length;
  const completed = chip.checklist.filter((_,i)=>done[i]).length;
  const pct = total>0 ? Math.round(completed/total*100) : 0;
  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <span style="font-size:11px;color:var(--muted)">Gate: <b style="color:var(--text)">${chip.nextGate}</b> · ${chip.nextGateDate}</span>
    <span style="font-size:11px;font-weight:700;color:var(--green)">${pct}%</span>
  </div>
  <div class="cl-progress"><div class="cl-fill" style="width:${pct}%"></div></div>
  <div style="margin-top:10px">`;
  chip.checklist.forEach((item,i)=>{
    const checked = !!done[i];
    html += `<div class="cl-item" onclick="toggleCL('${key}',${i})">
      <input type="checkbox" ${checked?'checked':''} onchange="toggleCL('${key}',${i})" onclick="event.stopPropagation()">
      <span class="cl-label${checked?' done':''}">${item.t}</span>
      <span class="cl-owner">${item.owner}</span>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('cl-body').innerHTML = html;
}

function toggleCL(chipId, idx){
  if(!S.clState[chipId]) S.clState[chipId]={};
  S.clState[chipId][idx] = !S.clState[chipId][idx];
  saveCL();
  renderChecklist();
}

function genStatusDraft(){
  const d = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const sel = S.pmChip;

  if(sel){
    // -- Single chip draft --
    const c = CHIPS[sel];
    const done = S.clState[c.id] || {};
    const clDone = c.checklist.filter((_,i)=>done[i]).length;
    const clPct = c.checklist.length ? Math.round(clDone/c.checklist.length*100) : 0;
    const openItems = c.checklist.filter((_,i)=>!done[i]).map(i=>i.t);
    let out = `=== ${c.code} / ${c.name} — DAILY STATUS · ${d} ===\n\n`;
    out += `SW CM: ${c.cm}\n`;
    out += `Phase: ${c.phase}\n`;
    out += `Progress: ${c.progress}% | Status: ${c.status}\n`;
    out += `Next Gate: ${c.nextGate} · ${c.nextGateDate}\n`;
    if(c.bugs>0) out += `Active Bugs: ${c.bugs} ⚠️\n`;
    out += `\n-- Gate Checklist (${clPct}% complete) --\n`;
    c.checklist.forEach((item,i)=>{
      out += `  [${done[i]?'✓':' '}] ${item.t} (${item.owner})\n`;
    });
    if(c.risks.length){
      out += `\n-- Risks --\n`;
      c.risks.forEach(r=>{ out += `  [${r.l.toUpperCase()}] ${r.t}\n`; });
    }
    if(openItems.length){
      out += `\n-- Open Action Items --\n`;
      openItems.slice(0,5).forEach(t=>{ out += `  • ${t}\n`; });
    }
    out += `\n-----------------------------------------`;
    out += `\nGenerated by Chip Pilot 2.0 · ${d}`;
    document.getElementById('draft-out').textContent = out;
  } else {
    // -- All chips draft --
    let out = `=== CHIP PROGRAM DAILY STATUS — ${d} ===\n`;
    out += `\nSUMMARY: ${Object.values(CHIPS).filter(c=>c.atRisk).length} chips at risk · `;
    out += `${Object.values(CHIPS).reduce((a,c)=>a+c.bugs,0)} active bugs across all programs\n`;
    out += `-----------------------------------------\n`;
    GROUPS.forEach(g=>{
      out += `\n[${g.icon} ${g.label.toUpperCase()}]\n`;
      Object.values(CHIPS).filter(c=>c.group===g.id).forEach(c=>{
        out += `\n• ${c.code} / ${c.name} (${c.cm})\n`;
        out += `  Status: ${c.status} | Progress: ${c.progress}%\n`;
        out += `  Next Gate: ${c.nextGate} · ${c.nextGateDate}\n`;
        if(c.risks.filter(r=>r.l!=='l').length)
          out += `  Risks: ${c.risks.filter(r=>r.l!=='l').map(r=>r.t).join('; ')}\n`;
        if(c.bugs>0) out += `  ⚠️ Active bugs: ${c.bugs}\n`;
      });
    });
    out += `\n-----------------------------------------`;
    out += `\nGenerated by Chip Pilot 2.0 · ${d}`;
    document.getElementById('draft-out').textContent = out;
  }
}

function copyDraft(){
  const txt = document.getElementById('draft-out').textContent;
  navigator.clipboard.writeText(txt).catch(()=>{
    const ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });
}

    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">

/* ===============================================
   COMMAND CENTER VIEW
=============================================== */
function selectCCChip(id){ S.ccChip=id; renderCC(); }
function selectCCCat(cat){ S.ccCat=cat; renderCC(); }
function toggleCC(key, idx){
  if(!S.ccState[key]) S.ccState[key]={};
  S.ccState[key][idx] = !S.ccState[key][idx];
  saveCC();
  renderCC();
}

function renderCC(){
  const sel = S.ccChip;
  const cat = S.ccCat || 'daily';

  // -- Chip selector --
  const allPill = `<div class="pm-pill${!sel?' on':''}" onclick="selectCCChip(null)">All Chips</div>`;
  const chipPills = Object.values(CHIPS).map(c=>
    `<div class="pm-pill${sel===c.id?' on':''}" onclick="selectCCChip('${c.id}')">${c.code}</div>`).join('');
  const selBar = `<div class="pm-sel-bar">
    <span class="pm-sel-lbl">Chip:</span>${allPill}${chipPills}
  </div>`;

  // -- Category tabs --
  const cats = [
    {id:'daily',    label:'🌅 Daily'},
    {id:'weekly',   label:'📅 Weekly'},
    {id:'gate',     label:'🚦 Gate Prep'},
    {id:'setup',    label:'🔧 Program Setup'},
    {id:'newchip',  label:'🆕 New Chip Setup'},
  ];
  const catBar = `<div class="cc-cats">${cats.map(c=>
    `<div class="cc-cat${cat===c.id?' on':''}" onclick="selectCCCat('${c.id}')">${c.label}</div>`).join('')}</div>`;

  // -- Build checklist content --
  let mainHTML = '';

  if(cat === 'newchip'){
    const nc = S.newChip;
    const chip = nc.name.trim().toUpperCase() || 'CHIP';
    const code = nc.codename.trim() || 'Codename';

    // Preview tree
    const treeHTML = S.ncStatus
      ? `<div class="pg-tree">${CHIP_PAGE_TMPL.map((p,i)=>{
          const title = p.title.replace(/{CHIP}/g,chip).replace(/{CODENAME}/g,code);
          const st = S.ncPages[i]?.status || 'pending';
          const stLabel = st==='done'?'Created':st==='error'?'Error':st==='queued'?'Queued':'Pending';
          const stCls = st==='done'?'pg-done':st==='error'?'pg-err':'pg-pending';
          const link = S.ncPages[i]?.url ? `<a href="${S.ncPages[i].url}" target="_blank" style="color:var(--green);font-size:9px;margin-left:6px">↗</a>` : '';
          return `<div class="pg-node${p.level===0?' root':''} pg-l${p.level}">
            <span class="pg-icon">${p.level===0?'📂':'📄'}</span>
            <span>${title}</span>${link}
            <span class="pg-status ${stCls}">${stLabel}</span>
          </div>`;
        }).join('')}</div>`
      : '';

    const structureLines = CHIP_PAGE_TMPL.map((p,i)=>
      `${i+1}. ${'  '.repeat(p.level)}${p.title.replace(/{CHIP}/g,chip).replace(/{CODENAME}/g,code)}`).join('\n');
    const coworkPrompt = `Create Confluence page structure for new chip ${chip} (${code}) in space ~ssriranjani under parent page 1613201410 on nvidia.atlassian.net. SW CM: ${nc.cm||'TBD'}. Use NR10 (page 3389539178) as content template.\n\nPages (indentation = parent):\n${structureLines}\n\nSubstitute NR10/Sirius with ${chip}/${code}. Set SW CM to "${nc.cm||'TBD'}". Leave all [TBD] fields for the team.`;

    const resultHTML = S.ncStatus==='copied'
      ? `<div class="nc-result" style="margin-bottom:12px">
          📋 <strong>Request copied to clipboard!</strong><br>
          Paste it in your <strong>Cowork chat</strong> and Claude will create all pages in Confluence instantly.<br><br>
          <details style="margin-top:4px"><summary style="cursor:pointer;font-size:10px;color:var(--green)">View prompt</summary>
          <pre style="margin-top:8px;font-size:9px;white-space:pre-wrap;color:var(--text2);background:var(--bg3);padding:8px;border-radius:5px">${coworkPrompt}</pre></details>
        </div>` : '';

    const btnLabel = S.ncStatus==='creating' ? '⏳ Creating…'
      : S.ncStatus==='preview' ? '🚀 Create in Confluence'
      : S.ncStatus==='copied' ? '📋 Copied!'
      : '👁️ Preview';
    const btnDisabled = S.ncStatus==='creating'||S.ncStatus==='copied' ? 'disabled' : '';

    mainHTML = `
      <div style="margin-bottom:6px">
        <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:12px">New Chip Confluence Setup</div>
        <div class="nc-form">
          <div class="nc-field">
            <label class="nc-label">Chip Name / ID</label>
            <input class="nc-input" id="nc-name" placeholder="e.g. NR20" value="${nc.name}"
              oninput="S.newChip.name=this.value;S.ncStatus=null;S.ncPages=[]">
          </div>
          <div class="nc-field">
            <label class="nc-label">Codename</label>
            <input class="nc-input" id="nc-code" placeholder="e.g. Orion" value="${nc.codename}"
              oninput="S.newChip.codename=this.value;S.ncStatus=null;S.ncPages=[]">
          </div>
          <div class="nc-field">
            <label class="nc-label">Group</label>
            <select class="nc-select" onchange="S.newChip.group=this.value">
              <option value="cpu"${nc.group==='cpu'?' selected':''}>CPU</option>
              <option value="gpu"${nc.group==='gpu'?' selected':''}>GPU</option>
              <option value="fusion"${nc.group==='fusion'?' selected':''}>Fusion</option>
            </select>
          </div>
          <div class="nc-field">
            <label class="nc-label">SW CM</label>
            <input class="nc-input" id="nc-cm" placeholder="e.g. Ranjani V" value="${nc.cm}"
              oninput="S.newChip.cm=this.value;S.ncStatus=null;S.ncPages=[]">
          </div>
          <div class="nc-field full">
            <label class="nc-label">Reference Chip (page structure template)</label>
            <select class="nc-select" onchange="S.newChip.ref=this.value">
              <option value="NR10"${nc.ref==='NR10'?' selected':''}>NR10 (Sirius) — page ID 3389539178</option>
              ${Object.values(CHIPS).map(c=>`<option value="${c.code}"${nc.ref===c.code?' selected':''}>${c.code} / ${c.name}</option>`).join('')}
            </select>
          </div>
        </div>
        ${treeHTML}
        ${resultHTML}
        <div style="display:flex;gap:8px">
          <button class="btn btn-green" ${btnDisabled}
            onclick="${S.ncStatus==='preview'?'createChipPages()':'previewChipSetup()'}"
            style="min-width:180px">${btnLabel}</button>
          ${S.ncStatus==='preview'?`<button class="btn" style="border-color:var(--border);color:var(--muted)" onclick="S.ncStatus=null;S.ncPages=[];renderCC()">Reset</button>`:''}
        </div>
      </div>`;

  } else if(cat === 'gate'){
    // Per-chip gate checklists
    const chips = sel ? [CHIPS[sel]] : Object.values(CHIPS);
    mainHTML = chips.map(c=>{
      const key = 'gate_'+c.id;
      const done = S.ccState[key] || {};
      const total = c.checklist.length;
      const completed = c.checklist.filter((_,i)=>!!done[i]).length;
      const pct = total ? Math.round(completed/total*100) : 0;
      const pctColor = pct===100?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
      const items = c.checklist.map((item,i)=>`
        <div class="cc-item" onclick="toggleCC('${key}',${i})">
          <input type="checkbox" ${done[i]?'checked':''} onclick="event.stopPropagation()" onchange="toggleCC('${key}',${i})">
          <div class="cc-item-body">
            <div class="cc-item-text${done[i]?' done':''}">${item.t}</div>
            <div class="cc-item-meta"><span class="cc-item-owner">${item.owner}</span></div>
          </div>
        </div>`).join('');
      return `<div class="cc-chip-block">
        <div class="cc-chip-hdr">
          <span class="cc-chip-code">${c.code} / ${c.name}</span>
          <span class="cc-chip-gate">Gate: ${c.nextGate} · ${c.nextGateDate}</span>
          <span class="cc-pct" style="color:${pctColor}">${pct}%</span>
        </div>
        <div class="cl-progress" style="margin-bottom:8px"><div class="cl-fill" style="width:${pct}%"></div></div>
        ${items||'<div class="cc-empty">No checklist items defined</div>'}
      </div>`;
    }).join('');

  } else {
    // Global task lists (daily / weekly / setup)
    const tasks = CC_TASKS[cat] || [];
    const key = cat;
    const done = S.ccState[key] || {};
    const completed = tasks.filter((_,i)=>!!done[i]).length;
    const pct = tasks.length ? Math.round(completed/tasks.length*100) : 0;
    const pctColor = pct===100?'var(--green)':pct>=50?'var(--amber)':'var(--text)';
    const items = tasks.map((task,i)=>`
      <div class="cc-item" onclick="toggleCC('${key}',${i})">
        <input type="checkbox" ${done[i]?'checked':''} onclick="event.stopPropagation()" onchange="toggleCC('${key}',${i})">
        <div class="cc-item-body">
          <div class="cc-item-text${done[i]?' done':''}">${task.t}</div>
        </div>
        <span class="cc-pri cc-pri-${task.pri}">${task.pri.toUpperCase()}</span>
      </div>`).join('');
    mainHTML = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:11px;color:var(--muted)">${completed} of ${tasks.length} complete</span>
        <span style="font-size:13px;font-weight:800;color:${pctColor}">${pct}%</span>
      </div>
      <div class="cl-progress" style="margin-bottom:14px"><div class="cl-fill" style="width:${pct}%"></div></div>
      ${items}`;
  }

  // -- Right panel: scoreboard --
  const gateRows = Object.values(CHIPS).map(c=>{
    const key = 'gate_'+c.id;
    const done = S.ccState[key] || {};
    const pct = c.checklist.length ? Math.round(c.checklist.filter((_,i)=>!!done[i]).length/c.checklist.length*100) : 0;
    const col = pct===100?'var(--green)':pct>=50?'var(--amber)':'var(--muted)';
    return `<div class="cc-score-row">
      <span style="font-weight:600;font-size:11px;color:var(--text)">${c.code}</span>
      <div style="flex:1;height:4px;background:var(--border);border-radius:2px;margin:0 10px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${col};border-radius:2px"></div>
      </div>
      <span style="font-size:11px;font-weight:700;color:${col};min-width:28px;text-align:right">${pct}%</span>
    </div>`;
  }).join('');

  const cadenceRows = ['daily','weekly','setup'].map(k=>{
    const tasks = CC_TASKS[k]||[];
    const done = S.ccState[k]||{};
    const pct = tasks.length ? Math.round(tasks.filter((_,i)=>!!done[i]).length/tasks.length*100) : 0;
    const labels = {daily:'Daily',weekly:'Weekly',setup:'Program Setup'};
    const col = pct===100?'var(--green)':pct>=50?'var(--amber)':'var(--muted)';
    return `<div class="cc-score-row" style="cursor:pointer" onclick="selectCCCat('${k}')">
      <span style="font-size:11px;color:var(--text2)">${labels[k]}</span>
      <span style="font-size:11px;font-weight:700;color:${col}">${pct}%</span>
    </div>`;
  }).join('');

  const panel = `<div class="cc-panel">
    <div class="card">
      <div class="card-hdr"><span class="card-title">📊 Completion</span></div>
      <div class="card-body" style="padding-top:6px">
        <div style="font-size:9px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:6px">CM Cadence</div>
        ${cadenceRows}
        <div style="font-size:9px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin:12px 0 6px">Gate Prep</div>
        ${gateRows}
      </div>
    </div>
  </div>`;

  document.getElementById('v-cc').innerHTML = selBar + `
    <div class="cc-layout">
      <div class="cc-main">${catBar}<div class="card"><div class="card-body">${mainHTML}</div></div></div>
      ${panel}
    </div>`;
}

/* ===============================================
   NEW CHIP SETUP
=============================================== */
function previewChipSetup(){
  const nc = S.newChip;
  if(!nc.name.trim()){ alert('Please enter a chip name.'); return; }
  if(!nc.codename.trim()){ alert('Please enter a codename.'); return; }
  S.ncStatus = 'preview';
  S.ncPages = CHIP_PAGE_TMPL.map(p=>({title:p.title,level:p.level,status:'pending',url:null}));
  renderCC();
}

async function createChipPages(){
  const nc = S.newChip;
  const chip = nc.name.trim().toUpperCase();
  const code = nc.codename.trim();
  S.ncStatus = 'creating';
  renderCC();

  // Confluence config
  const SPACE_ID   = '~ssriranjani';
  const PARENT_ID  = '1613201410'; // Ranjani V's Home
  const BASE_URL   = 'https://nvidia.atlassian.net/wiki';

  // Build page list with parent tracking
  const pages = CHIP_PAGE_TMPL.map(p=>({
    ...p,
    title: p.title.replace(/{CHIP}/g,chip).replace(/{CODENAME}/g,code),
    status:'pending', url:null, id:null
  }));

  // Root page body (based on NR10 template)
  function rootBody(chip, code, cm){
    return `<h2>Chip Soul</h2>
<p>${chip} (${code}) is a next-generation chip program. SW CM: <strong>${cm||'TBD'}</strong>. Currently in Pre-Silicon phase.</p>
<h2>Terminology</h2>
<table><thead><tr><th>Name</th><th>Description</th><th>Notes</th></tr></thead>
<tbody>
<tr><td>${chip}</td><td>Chip program identifier</td><td>Chip ID</td></tr>
<tr><td>${code}</td><td>Codename for ${chip}</td><td>Codename</td></tr>
</tbody></table>
<h2>${chip} POR</h2>
<ul>
<li><strong>HW POR:</strong> [TBD]</li>
<li><strong>ChipPOR:</strong> [TBD]</li>
<li><strong>SW POR Tracker:</strong> [TBD]</li>
</ul>
<h2>Key Links</h2>
<table><thead><tr><th>Resource</th><th>Link</th><th>Notes</th></tr></thead>
<tbody>
<tr><td>HW POR</td><td>[TBD]</td><td></td></tr>
<tr><td>Slack</td><td>#chips-${code.toLowerCase()}</td><td>Main SW channel</td></tr>
</tbody></table>
<h2>${chip} SW Leads</h2>
<table><thead><tr><th>Role</th><th>Name</th></tr></thead>
<tbody>
<tr><td>SW Chip Management</td><td>${cm||'[TBD]'}</td></tr>
<tr><td>Driver SW</td><td>[TBD]</td></tr>
<tr><td>FW</td><td>[TBD]</td></tr>
<tr><td>MODS</td><td>[TBD]</td></tr>
</tbody></table>`;
  }

  function subBody(title){ return `<p>${title}</p><p>[Content to be filled by SW leads — see NR10 for reference structure]</p>`; }

  // IDs for parent tracking by level
  let l0id=null, l1id=null;

  for(let i=0; i<pages.length; i++){
    const p = pages[i];
    const parentId = p.level===0 ? PARENT_ID : p.level===1 ? l0id : l1id;
    const body = p.level===0 ? rootBody(chip,code,nc.cm) : subBody(p.title);

    try {
      const payload = {
        spaceId: SPACE_ID,
        parentId,
        title: p.title,
        body,
        contentFormat: 'html',
        status: 'current'
      };
      // Call Claude via postMessage to execute the Confluence API
      // Since we're in a static page, we queue this for Cowork execution
      // For now, simulate and store the spec
      pages[i].status = 'queued';
      if(p.level===0) l0id = 'queued_'+i;
      else if(p.level===1) l1id = 'queued_'+i;
    } catch(e){
      pages[i].status = 'error';
    }
  }

  // Build the Cowork prompt and copy to clipboard
  const chip_uc = chip;
  const structureLines = pages.map((p,i)=>`${i+1}. ${'  '.repeat(p.level)}${p.title}`).join('\n');
  const prompt = `Create Confluence page structure for new chip ${chip_uc} (${code}) in space ~ssriranjani under parent page 1613201410 ("Ranjani V's Home") on nvidia.atlassian.net. SW CM: ${nc.cm||'TBD'}. Use NR10 (Sirius) page ID 3389539178 as content reference.

Pages to create in this order (indentation = parent relationship):
${structureLines}

Create each page with content based on the NR10 template. Substitute all occurrences of "NR10"/"Sirius" with "${chip_uc}"/"${code}". Set SW CM to "${nc.cm||'TBD'}". Leave all [TBD] links as-is for the team to fill in.`;

  navigator.clipboard.writeText(prompt).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=prompt; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });

  S.ncPages = pages.map(p=>({...p, status:'queued'}));
  S.ncStatus = 'copied';
  renderCC();
}
